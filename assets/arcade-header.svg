<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Omar Hossam GitHub profile arcade header</title>
  <desc id="desc">A professional 1990s arcade-inspired animated banner for Omar Hossam.</desc>
  <style>
    @keyframes scan { 0% { transform: translateY(-360px); } 100% { transform: translateY(360px); } }
    @keyframes drift { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-42px); } }
    @keyframes pulse { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
    @keyframes blink { 0%,46%,100% { opacity: 1; } 47%,63% { opacity: .15; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .title { font: 900 78px "Segoe UI", Arial, sans-serif; letter-spacing: 4px; }
    .sub { font: 700 25px "Segoe UI", Arial, sans-serif; letter-spacing: 3px; }
    .small { font: 700 17px "Consolas", "Courier New", monospace; letter-spacing: 2px; }
    .scanline { animation: scan 4s linear infinite; }
    .drift { animation: drift 7s ease-in-out infinite; }
    .pulse { animation: pulse 1.8s ease-in-out infinite; }
    .blink { animation: blink 1.25s step-end infinite; }
    .float { animation: float 3.5s ease-in-out infinite; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05080D"/>
      <stop offset=".46" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="neon" x1="202" y1="88" x2="999" y2="274" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset=".52" stop-color="#10B981"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#38BDF8" stroke-opacity=".12" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <g class="drift">
    <rect x="-30" y="0" width="1280" height="360" fill="url(#grid)"/>
  </g>
  <path d="M0 285C155 238 263 246 392 282C549 326 639 329 792 278C943 228 1059 226 1200 270V360H0V285Z" fill="#061821"/>
  <path d="M0 305C168 256 300 274 429 304C557 334 666 332 806 294C972 249 1086 253 1200 292" stroke="#38BDF8" stroke-opacity=".55" stroke-width="2"/>
  <path d="M0 326C196 283 313 299 450 325C604 354 728 350 872 315C1013 281 1100 283 1200 312" stroke="#10B981" stroke-opacity=".45" stroke-width="2"/>

  <g filter="url(#soft)" opacity=".55">
    <circle cx="235" cy="92" r="68" fill="#38BDF8"/>
    <circle cx="974" cy="98" r="78" fill="#10B981"/>
    <circle cx="902" cy="262" r="45" fill="#F59E0B"/>
  </g>

  <g class="float" filter="url(#glow)">
    <path d="M154 102h42v42h-42zM196 144h42v42h-42zM112 144h42v42h-42zM154 186h42v42h-42z" fill="#38BDF8" opacity=".85"/>
    <path d="M1016 108h36v36h-36zM1052 144h36v36h-36zM980 144h36v36h-36zM1016 180h36v36h-36z" fill="#F59E0B" opacity=".9"/>
  </g>

  <rect x="177" y="70" width="846" height="210" rx="22" fill="#070B15" fill-opacity=".84" stroke="url(#neon)" stroke-width="4"/>
  <rect x="194" y="88" width="812" height="174" rx="14" stroke="#FFFFFF" stroke-opacity=".12" stroke-width="2"/>

  <text x="600" y="165" text-anchor="middle" class="title" fill="#F8FBFF" filter="url(#glow)">OMAR HOSSAM</text>
  <text x="600" y="207" text-anchor="middle" class="sub" fill="url(#neon)">AI STUDENT  |  SOFTWARE  |  CLOUD  |  DEVOPS</text>
  <text x="600" y="240" text-anchor="middle" class="small" fill="#B9F7FF">PRESS START TO BUILD • DEBUG • SHIP</text>

  <g class="pulse">
    <rect x="270" y="112" width="16" height="16" fill="#F59E0B"/>
    <rect x="914" y="112" width="16" height="16" fill="#38BDF8"/>
    <rect x="270" y="225" width="16" height="16" fill="#10B981"/>
    <rect x="914" y="225" width="16" height="16" fill="#F59E0B"/>
  </g>
  <rect class="scanline" x="0" y="0" width="1200" height="78" fill="#FFFFFF" opacity=".06"/>
  <rect width="1200" height="360" fill="url(#grid)" opacity=".12"/>
  <text x="600" y="318" text-anchor="middle" class="small blink" fill="#F59E0B">READY PLAYER OMAR</text>
</svg>
